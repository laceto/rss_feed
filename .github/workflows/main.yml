name: daily-pipeline

on:
  schedule:
    - cron: "0 19 * * 1-5"
  workflow_dispatch:

jobs:  
  build:  
    runs-on: ubuntu-latest  
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
    - uses: r-lib/actions/setup-r@v2
    - uses: r-lib/actions/setup-r-dependencies@v2
      with:
        working-directory: scraper

    - name: Download feeds
      run: Rscript scraper/download.R

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Python dependencies
      run: pip install openai pydantic python-dotenv pandas datasets huggingface_hub

    - name: Push new feeds to Hugging Face
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HUGGINGFACE_REPO: ${{ secrets.HUGGINGFACE_REPO }}
      run: python push_new_feeds_to_hf.py

    - name: Verify HF dataset updated
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HUGGINGFACE_REPO: ${{ secrets.HUGGINGFACE_REPO }}
      run: |
        python -c "
        import os
        from datasets import load_dataset
        ds = load_dataset(os.environ['HUGGINGFACE_REPO'], split='train', token=os.environ['HF_TOKEN'])
        dates = [d for d in ds['pubDate'] if d]
        print(f'HF dataset rows: {len(ds)}')
        print(f'Latest pubDate: {max(dates)}')
        "

    - name: Submit sector batch
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HUGGINGFACE_REPO: ${{ secrets.HUGGINGFACE_REPO }}
      run: python create_batch_files_v2.py

    # - name: Run Script delete
    #  run: Rscript script_del.R

    - name: Commit results
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add .
        git commit -m "scraping" || echo "No changes to commit"
        git push origin || echo "No changes to commit"-
