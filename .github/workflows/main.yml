on:
  schedule:
    - cron:  "0 19 * * 1-5"
  workflow_dispatch:

jobs:  
  build:  
    runs-on: ubuntu-latest  
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - uses: actions/checkout@v4
    - uses: r-lib/actions/setup-r@v2
    - uses: r-lib/actions/setup-r-dependencies@v2
  
    - name: Download feeds
      run: Rscript download.R

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Python dependencies
      run: pip install langchain-core langchain-openai pydantic python-dotenv pandas

    - name: Enrich feeds
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python enrich_feeds.py

    # - name: Run Script delete
    #  run: Rscript script_del.R

    - name: Commit results
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add .
        git commit -m "scraping" || echo "No changes to commit"
        git push origin || echo "No changes to commit"-
